server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/speechkids}
    username: ${SPRING_DATASOURCE_USERNAME:speechkids}
    password: ${SPRING_DATASOURCE_PASSWORD:speechkids}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:change-me-please-change-me-please-change}
  access-token-minutes: ${JWT_ACCESS_MINUTES:60}
  refresh-token-days: ${JWT_REFRESH_DAYS:14}

app:
  audio-storage-dir: ${AUDIO_STORAGE_DIR:./data/audio}
