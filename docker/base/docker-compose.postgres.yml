version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-halfi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-halfi_password}
      POSTGRES_DB: ${POSTGRES_DB:-halfi_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - halfi_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  halfi_network:
    external: true
