
services:
  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Gateway doesn't need DB usually, but maybe auth endpoints do? Let's keep it clean
    networks:
      - halfi_network
    restart: unless-stopped

networks:
  halfi_network:
    external: true
