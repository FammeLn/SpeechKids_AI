services:
  profile-service:
    build:
      context: ../../profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "8084:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=halfi_profile_db
      - DB_USER=${POSTGRES_USER:-halfi}
      - DB_PASS=${POSTGRES_PASSWORD:-halfi_password}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - halfi_network
    restart: unless-stopped

networks:
  halfi_network:
    external: true
