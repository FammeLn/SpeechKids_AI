events {
    worker_connections 1024;
}

http {
    # Апстримы — имена совпадают с именами контейнеров в docker-compose
    upstream auth_service {
        server auth-service:8081;
    }

    upstream user_service {
        server user-service:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # Увеличиваем таймауты для Spring Boot старта
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Передаём реальный IP клиента в сервисы
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        # ── /auth/* → auth-service:8081 ──────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service/auth/;
        }

        # ── /users/* → user-service:8082 ─────────────────────────────
        location /users/ {
            proxy_pass http://user_service/users/;
        }


        location / {
            proxy_pass http://frontend:5173;
        }

        # ── Health check самого gateway ───────────────────────────────
        location /health {
            return 200 '{"status":"UP","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}