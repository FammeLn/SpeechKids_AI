server:
  port: 8080

spring:
  application:
    name: auth-service

  kafka:
    bootstrap-servers: kafka:29092

  datasource:
    url: jdbc:postgresql://localhost:5432/halfi_db
    username: halfi
    password: halfi_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true