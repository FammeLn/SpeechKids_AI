server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/halfi_auth_db
    username: halfi_auth
    password: ${AUTH_DB_PASS:halfi_auth_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false   # не добавлять Java-тип в заголовок

# JWT настройки — читаются через @Value в JwtService
jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForHalfiAtLeast32Chars}
  access-expiry-ms: 900000       # 15 минут
  refresh-expiry-ms: 604800000   # 7 дней

# Email-код
email-code:
  length: 6
  ttl-minutes: 10
  cooldown-seconds: 60